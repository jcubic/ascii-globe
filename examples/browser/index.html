<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASCII Globe Explorer</title>
<style>
  :root {
    --accent: #38bdf8;
    --bg: #020617;
    --panel: rgba(15, 23, 42, 0.8);
    --glass-border: rgba(255, 255, 255, 0.1);
  }

  body {
    background-color: var(--bg);
    /* Animated Star Field using radial gradients */
    background-image: 
      radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
      radial-gradient(1px 1px at 40px 70px, #fff, rgba(0,0,0,0)),
      radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)),
      radial-gradient(1px 1px at 90px 40px, #fff, rgba(0,0,0,0)),
      radial-gradient(1px 1px at 130px 80px, #fff, rgba(0,0,0,0));
    background-size: 200px 200px;
    color: #f8fafc;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  #container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
    z-index: 10;
  }

  /* Title Aesthetic */
  h1 {
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 0.4em;
    color: var(--accent);
    margin: 0;
    opacity: 0.8;
  }

  /* The Globe Container */
  #globe-wrapper {
    position: relative;
    padding: 20px;
  }

  #globe {
    font-family: 'Fira Code', 'Courier New', monospace;
    font-weight: 900;
    font-size: clamp(9px, 1.2vw, 12px);
    line-height: 1.1;
    letter-spacing: 0.08em;
    cursor: grab;
    user-select: none;
    transition: text-shadow 0.3s ease;
    /* Atmospheric glow */
    filter: drop-shadow(0 0 15px rgba(56, 189, 248, 0.2));
  }

  #globe.dragging { cursor: grabbing; }

  /* Glassmorphism Control Panel */
  .controls {
    background: var(--panel);
    backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
    padding: 1.2rem 2rem;
    border-radius: 20px;
    display: flex;
    gap: 25px;
    align-items: center;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
  }

  .control-item {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  label {
    font-size: 0.65rem;
    font-weight: 800;
    color: #64748b;
    text-transform: uppercase;
  }

  /* Modern range inputs */
  input[type="range"] {
    appearance: none;
    background: #1e293b;
    height: 4px;
    border-radius: 2px;
    width: 100px;
  }

  input[type="range"]::-webkit-slider-thumb {
    appearance: none;
    width: 12px;
    height: 12px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 10px var(--accent);
  }

  button {
    background: var(--accent);
    color: #020617;
    border: none;
    padding: 8px 20px;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.2s;
  }

  button:hover { transform: scale(1.05); }

  select {
    background: #0f172a;
    color: white;
    border: 1px solid var(--glass-border);
    padding: 5px;
    border-radius: 4px;
    font-size: 0.8rem;
  }
</style>
</head>
<body>

<div id="container">
  <h1>Planetary Observer</h1>
  
  <div id="globe-wrapper">
    <pre id="globe"></pre>
  </div>

  <div class="controls">
    <button id="toggle">Animate</button>

    <div class="control-item">
      <label>Target</label>
      <select id="mapSelect">
        <option value="earth">Earth</option>
        <option value="moon">The Moon</option>
        <option value="mars">Mars</option>
        <option value="death-star">DS-1 Platform</option>
      </select>
    </div>

    <div class="control-item">
      <label>Long: <span id="valH">0</span>°</label>
      <input id="inputH" type="range" min="-180" max="180" value="0">
    </div>

    <div class="control-item">
      <label>Lat: <span id="valV">0</span>°</label>
      <input id="inputV" type="range" min="-90" max="90" value="0">
    </div>

    <div class="control-item">
      <label>Tilt: <span id="valTilt">0</span>°</label>
      <input id="inputTilt" type="range" min="-45" max="45" value="0">
    </div>
  </div>
</div>

<script type="module">
import Globe from '../../dist/index.js';
import deathStarMap from '../../dist/maps/death-star.js';

Globe.maps['death-star'] = deathStarMap;

const earthPins = [
    { lat: 52.23, long: 21.01 }, { lat: 40.71, long: -74.01 },
    { lat: 39.90, long: 116.40 }, { lat: -22.91, long: -43.17 }
];

const themes = {
    earth: {
        chars: [' ', '·', '■', '●'],
        colors: ['', '#3b82f6', '#22c55e', '#ef4444'],
        pins: earthPins,
        glow: 'rgba(59, 130, 246, 0.4)'
    },
    moon: {
        chars: [' ', '·', '◦', '0'],
        colors: ['', '#1e293b', '#94a3b8', '#f8fafc'],
        pins: [],
        glow: 'rgba(255, 255, 255, 0.1)'
    },
    mars: {
        chars: [' ', '·', '▒', '█'],
        colors: ['', '#450a0a', '#991b1b', '#f87171'],
        pins: [],
        glow: 'rgba(248, 113, 113, 0.2)'
    },
    'death-star': {
        chars: [' ', '·', '#', '@'],
        colors: ['', '#000', '#475569', '#22c55e'],
        pins: [],
        glow: 'rgba(34, 197, 94, 0.2)'
    }
};

let tilt = 0;
let rotH = 0;
let rotV = 0;
let playing = false;

const pre = document.getElementById('globe');
const mapSelect = document.getElementById('mapSelect');
const btn = document.getElementById('toggle');

function createGlobe(mapName) {
    const theme = themes[mapName];
    // Apply theme glow to the pre tag
    pre.style.filter = `drop-shadow(0 0 15px ${theme.glow})`;
    
    return new Globe({
        size: 1.4,
        map: Globe.maps[mapName === 'earth' ? 'earth' : (mapName === 'death-star' ? 'death-star' : 'earth')], 
        tilt,
        pins: theme.pins,
        format(type, length) {
            const text = (theme.chars[type] ?? theme.chars[3]).repeat(length);
            const color = theme.colors[type] ?? theme.colors[3];
            return color ? `<span style="color:${color}">${text}</span>` : text;
        }
    });
}

let globe = createGlobe('earth');

function render() {
    pre.innerHTML = globe.render([rotH, rotV]);
    document.getElementById('valH').textContent = Math.round(rotH);
    document.getElementById('valV').textContent = Math.round(rotV);
    document.getElementById('valTilt').textContent = tilt;
}

// Event Listeners
mapSelect.addEventListener('change', () => {
    globe = createGlobe(mapSelect.value);
    render();
});

btn.addEventListener('click', () => {
    playing = !playing;
    btn.textContent = playing ? 'Stop' : 'Animate';
    if (playing) loop();
});

function loop() {
    if (!playing) return;
    rotH = (rotH + 0.5) % 360;
    render();
    requestAnimationFrame(loop);
}

// Slider controls
const sliders = ['H', 'V', 'Tilt'];
sliders.forEach(s => {
    const el = document.getElementById(`input${s}`);
    el.addEventListener('input', () => {
        if (s === 'H') rotH = parseFloat(el.value);
        if (s === 'V') rotV = parseFloat(el.value);
        if (s === 'Tilt') {
            tilt = parseFloat(el.value);
            globe = createGlobe(mapSelect.value);
        }
        render();
    });
});

// Dragging logic
let dragging = false;
let lastX, lastY;

pre.addEventListener('mousedown', e => { 
  dragging = true; lastX = e.clientX; lastY = e.clientY; 
  pre.classList.add('dragging');
});

window.addEventListener('mousemove', e => {
    if (!dragging) return;
    rotH += (e.clientX - lastX) * 0.5;
    rotV += (e.clientY - lastY) * 0.5;
    lastX = e.clientX; lastY = e.clientY;
    render();
});

window.addEventListener('mouseup', () => {
    dragging = false;
    pre.classList.remove('dragging');
});

render();
</script>
</body>
</html>
