<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASCII Globe</title>
<style>
  body {
    background: #383838;
    color: #fff;
    font-family: sans-serif;
    margin: 20px;
  }
  #globe {
    font-family: 'Courier New', Courier, monospace;
    font-weight: bold;
    font-size: 12px;
    line-height: 1.3;
    letter-spacing: 0.05em;
    cursor: grab;
    user-select: none;
  }
  #globe.dragging {
    cursor: grabbing;
  }
  .controls {
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  button {
    padding: 6px 16px;
    font-size: 14px;
    cursor: pointer;
  }
  label {
    font-size: 14px;
  }
  input[type="number"] {
    width: 80px;
    padding: 4px;
    font-size: 14px;
  }
</style>
</head>
<body>

<pre id="globe"></pre>
<div class="controls">
  <button id="toggle">Animate</button>
  <label>H: <input id="inputH" type="number" min="-360" max="360" step="0.1" value="0"></label>
  <label>V: <input id="inputV" type="number" min="-90" max="90" step="0.1" value="0"></label>
</div>

<script type="module">
import Globe from '../../dist/index.js';

const chars = [' ', '-', '#', '@'];
const colors = ['', '', '#2d5', 'red'];

const globe = new Globe({
    size: 1.4,
    pins: [
        { lat: 52.23, long: 21.01 },   // Warsaw
        { lat: 40.71, long: -74.01 },  // New York
        { lat: 39.90, long: 116.40 },  // Beijing
        { lat: -22.91, long: -43.17 }, // Rio de Janeiro
        { lat: -26.20, long: 28.04 },  // Johannesburg
        { lat: -37.81, long: 144.96 }, // Melbourne
    ],
    format(type, length) {
        const text = (chars[type] ?? chars[3]).repeat(length);
        const color = colors[type] ?? colors[3];
        if (!color) return text;
        return `<span style="color:${color}">${text}</span>`;
    }
});

const pre = document.getElementById('globe');
const inputH = document.getElementById('inputH');
const inputV = document.getElementById('inputV');
const btn = document.getElementById('toggle');

let rotH = 0;
let rotV = 0;

function syncInputs() {
    inputH.value = rotH.toFixed(1);
    inputV.value = rotV.toFixed(1);
}

function render() {
    pre.innerHTML = globe.render([rotH, rotV]);
    syncInputs();
}

let dragging = false;
let lastX = 0;
let lastY = 0;

pre.addEventListener('mousedown', (e) => {
    dragging = true;
    lastX = e.clientX;
    lastY = e.clientY;
    pre.classList.add('dragging');
});

window.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const dx = e.clientX - lastX;
    const dy = e.clientY - lastY;
    rotH = (rotH + dx * 0.5) % 360;
    rotV = Math.max(-90, Math.min(90, rotV + dy * 0.5));
    lastX = e.clientX;
    lastY = e.clientY;
    render();
});

window.addEventListener('mouseup', () => {
    dragging = false;
    pre.classList.remove('dragging');
});

pre.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    dragging = true;
    lastX = t.clientX;
    lastY = t.clientY;
}, { passive: true });

window.addEventListener('touchmove', (e) => {
    if (!dragging) return;
    const t = e.touches[0];
    const dx = t.clientX - lastX;
    const dy = t.clientY - lastY;
    rotH = (rotH + dx * 0.5) % 360;
    rotV = Math.max(-90, Math.min(90, rotV + dy * 0.5));
    lastX = t.clientX;
    lastY = t.clientY;
    render();
}, { passive: true });

window.addEventListener('touchend', () => {
    dragging = false;
});

let playing = false;

function loop() {
    if (!playing) return;
    rotH = (rotH + 0.3) % 360;
    render();
    requestAnimationFrame(loop);
}

btn.addEventListener('click', () => {
    playing = !playing;
    btn.textContent = playing ? 'Pause' : 'Animate';
    inputH.disabled = playing;
    if (playing) loop();
});

inputH.addEventListener('change', () => {
    rotH = parseFloat(inputH.value) || 0;
    render();
});

inputV.addEventListener('change', () => {
    rotV = Math.max(-90, Math.min(90, parseFloat(inputV.value) || 0));
    render();
});

render();
</script>
</body>
</html>
